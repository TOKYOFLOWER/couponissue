<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>クーポン管理 - クーポン管理システム</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="admin-nav">
    <a href="index.html" class="nav-brand"><img src="img/logo.svg" alt="logo"><h1>クーポン管理システム</h1></a>
    <ul class="nav-links">
      <li><a href="index.html">ダッシュボード</a></li>
      <li><a href="members.html">会員管理</a></li>
      <li><a href="coupons.html">クーポン</a></li>
      <li><a href="mail.html">メルマガ</a></li>
    </ul>
  </nav>

  <div class="admin-container">
    <div class="toolbar">
      <h2 class="card-title">クーポン管理</h2>
      <button class="btn btn-primary btn-small" onclick="showCouponModal()">新規作成</button>
    </div>

    <div class="table-wrapper">
      <table class="data-table">
        <thead><tr><th>ID</th><th>クーポン名</th><th>タイプ</th><th>値</th><th>期限</th><th>利用フロー</th><th>状態</th><th>操作</th></tr></thead>
        <tbody id="couponsTable"><tr><td colspan="8" class="loading"><div class="spinner"></div></td></tr></tbody>
      </table>
    </div>

    <div class="card" style="margin-top:24px;">
      <h3 class="card-title">発行済みクーポン</h3>
      <div class="table-wrapper">
        <table class="data-table">
          <thead><tr><th>クーポン</th><th>会員</th><th>発行日</th><th>有効期限</th><th>ステータス</th></tr></thead>
          <tbody id="issuedTable"><tr><td colspan="5" class="loading"><div class="spinner"></div></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- クーポンモーダル -->
  <div class="modal-overlay" id="couponModal">
    <div class="modal">
      <div class="modal-header"><h3 id="couponModalTitle">新規クーポン作成</h3><button class="modal-close" onclick="closeModal('couponModal')">&times;</button></div>
      <input type="hidden" id="editCouponId">
      <div class="form-group"><label>クーポン名 <span class="required">必須</span></label><input type="text" class="form-input" id="cName" placeholder="例: 春の10%OFFクーポン"></div>
      <div class="form-group"><label>タイプ</label><select class="form-select" id="cType" onchange="updateValueLabel()"><option value="percent">割引率（%OFF）</option><option value="fixed">固定金額（円引き）</option><option value="benefit">特典</option><option value="point">ポイント付与</option></select></div>
      <div class="form-group"><label id="cValueLabel">割引率（数値）</label><input type="text" class="form-input" id="cValue" placeholder="10"></div>
      <div class="form-group"><label>説明文</label><textarea class="form-textarea" id="cDescription" rows="2"></textarea></div>
      <div class="form-group"><label>期限タイプ</label><select class="form-select" id="cExpiryType" onchange="toggleExpiryFields()"><option value="relative">相対期限（発行後N日）</option><option value="absolute">絶対期限（指定日）</option></select></div>
      <div class="form-group" id="expiryDaysGroup"><label>有効日数</label><input type="number" class="form-input" id="cExpiryDays" value="30" min="1"></div>
      <div class="form-group" id="expiryDateGroup" style="display:none;"><label>有効期限日</label><input type="date" class="form-input" id="cExpiryDate"></div>
      <div class="form-group"><label>配信方法</label><select class="form-select" id="cDistribution"><option value="individual">個別配信</option><option value="mail_magazine">メルマガ</option><option value="birthday">誕生日</option><option value="qr_store">店頭QR</option></select></div>
      <div class="form-group"><label>利用フロー</label><select class="form-select" id="cUsageFlow"><option value="customer_swipe">お客様スワイプ</option><option value="staff_operate">スタッフ操作</option></select></div>
      <div class="form-group"><label>デザインカラー</label><input type="color" class="form-input" id="cDesignColor" value="#F8BBD0" style="height:44px;"></div>
      <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="cIsActive" checked>有効にする</label></div>
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" onclick="saveCoupon()" style="flex:1;">保存</button>
        <button class="btn btn-secondary" onclick="closeModal('couponModal')" style="flex:1;">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- 発行モーダル -->
  <div class="modal-overlay" id="issueModal">
    <div class="modal">
      <div class="modal-header"><h3>クーポン発行</h3><button class="modal-close" onclick="closeModal('issueModal')">&times;</button></div>
      <p id="issueCouponInfo" style="margin-bottom:16px;"></p>
      <input type="hidden" id="issueCouponId">
      <div class="form-group"><label>発行先会員を選択</label><div id="issueMemberList" style="max-height:300px;overflow-y:auto;border:1px solid #ddd;border-radius:8px;padding:8px;">読み込み中...</div></div>
      <button class="btn btn-primary btn-block" onclick="executeIssueCoupon()" style="margin-top:8px;">発行する</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/coupons.js"></script>
</body>
</html>
